[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[project]
name = "oss-issue-analyzer"
version = "0.1.0"
description = "A CLI tool that helps first-time open source contributors find issues they can solve in local repositories."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "rich>=15.0.0",
    "typer>=0.24.1",
    "pydantic>=2.0.0",
    "lancedb>=0.1.0",
    "sentence-transformers>=2.0.0",
    "torch>=2.0.0",
    "tree-sitter>=0.20.0",
    "tree-sitter-python",
    "tree-sitter-javascript",
    "tree-sitter-typescript",
    "tree-sitter-languages",
]

[project.scripts]
oss-issue-analyzer = "src.__main__:app"
start = "src.__main__:app"
dev = "src.__main__:app"