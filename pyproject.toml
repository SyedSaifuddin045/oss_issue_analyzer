[project]
name = "oss-issue-analyzer"
version = "0.1.0"
description = " A CLI tool that helps first-time open source contributors find issues they can solve in local repositories. It indexes the codebase, maps issues to relevant code, estimates difficulty, and surfaces beginner-friendly opportunities."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "rich>=15.0.0",
    "typer>=0.24.1",
]

[project.scripts]
start = "main:app"
